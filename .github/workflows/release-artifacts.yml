name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected Maven project version, for example 0.2.0-alpha"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-release-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify and package
        shell: pwsh
        run: ./scripts/prepare-release.ps1 -ExpectedVersion "${{ inputs.version }}"

      - name: Upload release directory
        uses: actions/upload-artifact@v4
        with:
          name: jvm-profiler-agent-${{ inputs.version }}-release
          path: target/release/
          if-no-files-found: error
