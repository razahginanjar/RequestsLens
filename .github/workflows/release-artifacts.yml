name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected Maven project version, for example 0.2.0-alpha"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify and package
        shell: pwsh
        run: ./scripts/prepare-release.ps1 -ExpectedVersion "${{ inputs.version }}"

      - name: Upload release directory
        uses: actions/upload-artifact@v4
        with:
          name: requestlens-agent-${{ inputs.version }}-release
          path: target/release/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    timeout-minutes: 10

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: requestlens-agent-${{ inputs.version }}-release
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          draft: false
          prerelease: ${{ contains(inputs.version, 'alpha') || contains(inputs.version, 'beta') || contains(inputs.version, 'rc') }}
          files: release/**/*
          generate_release_notes: true